<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
    <header class="flex justify-between items-center mb-10 backdrop-blur-lg bg-white/40 rounded-2xl p-4 shadow-3xl">
      <h1 class="text-2xl font-bold tracking-wide">WebChat</h1>
      <nav class="space-x-6">
        <a href="index.html" class="hover:text-blue-200 transition">Home</a>
        <a href="about.html" class="hover:text-blue-200 transition">Sobre</a>
      </nav>
    </header>
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-5">Chat Room</h1>
        <div class="bg-white p-4 rounded-lg shadow mb-4 h-96 overflow-y-auto">
            <!-- Chat messages will go here -->
            <div class="mb-2">
                <span class="font-semibold">Alice:</span>
                <span class="text-gray-700">Hi everyone!</span>
            </div>
            <div class="mb-2">
                <span class="font-semibold">Bob:</span>
                <span class="text-gray-700">Hello Alice!</span>
            </div>
        </div>
        <form class="flex space-x-2">
            <input type="text" placeholder="Type your message..." class="flex-grow bg-gray-100 border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-300">
                Send
            </button>
        </form>
    </div>
</body>
</html>
