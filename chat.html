<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat — Conversa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <header class="apple-nav sticky top-0 z-50 w-full h-[48px] flex items-center justify-center">
        <nav class="max-w-[980px] w-full flex justify-between items-center px-4">
            <span class="font-semibold tracking-tight text-[17px]">WebChat</span>
            <div class="flex space-x-8 text-[12px] font-normal text-black/80">
                <a href="index.html" class="hover:text-black transition">Home</a>
                <a href="rooms.html" class="hover:text-black transition">Rooms</a>
                <a href="about.html" class="hover:text-black transition">Sobre</a>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex flex-col max-w-[800px] mx-auto w-full p-4 md:p-6 h-[calc(100vh-48px)]">
        
        <div class="mb-6 text-center">
            <h1 class="hero-title text-[24px] font-semibold text-[#1d1d1f]">Chat Geral</h1>
        </div>

        <div id="chat-container" class="flex-grow overflow-y-auto space-y-4 mb-6 pr-2 chat-container">
            
            <div class="flex flex-col items-start">
                <span class="text-[12px] text-[#86868b] ml-3 mb-1 font-medium">Alice</span>
                <div class="bg-white/70 backdrop-blur-sm text-[#1d1d1f] px-4 py-2 rounded-[18px] max-w-[70%] shadow-sm">
                    <p class="text-[16px] leading-snug">Olá pessoal, como está o novo design?</p>
                </div>
            </div>

            <div class="flex flex-col items-end">
                <div class="bg-[#0071e3] text-white px-4 py-2 rounded-[18px] max-w-[70%] shadow-sm">
                    <p class="text-[16px] leading-snug">Ficou incrível! Muito mais limpo.</p>
                </div>
                <span class="text-[11px] text-[#86868b] mr-3 mt-1 uppercase tracking-widest">Enviado</span>
            </div>

            <div class="flex flex-col items-start">
                <span class="text-[12px] text-[#86868b] ml-3 mb-1 font-medium">Bob</span>
                <div class="bg-white/70 backdrop-blur-sm text-[#1d1d1f] px-4 py-2 rounded-[18px] max-w-[70%] shadow-sm">
                    <p class="text-[16px] leading-snug">A tipografia Inter realmente faz diferença na leitura.</p>
                </div>
            </div>

        </div>

        <footer class="pb-4">
            <form id="chat-form" class="relative flex items-center">
                <input id="message-input" type="text" placeholder="Message" autocomplete="off"
                       class="apple-input w-full bg-white/50 border border-[#d2d2d7] rounded-[22px] py-3 pl-5 pr-12 text-[16px] focus:outline-none focus:bg-white transition-all">
                
                <button type="submit" class="absolute right-2 bg-[#0071e3] text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-[#0077ed] transition shadow-sm">
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" class="w-4 h-4 text-white">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18"></path>
                    </svg>
                </button>
            </form>
        </footer>

    </main>

</body>
</html>
