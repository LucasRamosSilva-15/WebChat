<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen flex flex-col">
    <header class="apple-nav sticky top-0 z-50 w-full h-[48px] flex items-center justify-center">
        <nav class="max-w-[980px] w-full flex justify-between items-center px-4">            
            <span class="font-semibold tracking-tight text-[17px]">WebChat</span>            
            <div class="flex space-x-8 text-[12px] font-normal text-black/80">
                <a href="index.html" class="hover:text-black transition">Home</a>
                <a href="rooms.html" class="hover:text-black transition">Rooms</a>
                <a href="about.html" class="hover:text-black transition">Sobre</a>
            </div>
        </nav>
    </header>
    <main class="flex-grow flex items-center justify-center px-6">        
        <div class="bg-white/80 backdrop-blur-xl rounded-[28px] shadow-2xl p-10 max-w-[400px] w-full text-center">
            <h1 class="hero-title text-[40px] font-semibold mb-2 text-[#1d1d1f]">
                Acesse o WebChat
            </h1>
            <p class="text-[17px] font-normal text-[#86868b] mb-10 tracking-tight">
                Insira seus detalhes abaixo
            </p>
            <form class="space-y-6 text-left">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required 
                           class="apple-input w-full px-4 py-3 rounded-[12px] border border-[#d2d2d7] bg-white/50 focus:outline-none">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required 
                           class="apple-input w-full px-4 py-3 rounded-[12px] border border-[#d2d2d7] bg-white/50 focus:outline-none">
                </div>
                <button type="submit" class="btn-pill btn-primary w-full py-3 text-[17px] font-normal mt-4">
                    Continuar
                </button>
            </form>

            <div class="mt-8">
                <a href="register.html" class="text-[14px] text-[#0066cc] hover:underline">
                    Ainda não tem uma conta? Crie a sua aqui ›
                </a>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center">
        <p class="text-[12px] text-black/40 font-normal">
            Copyright © 2026 WebChat Inc. Todos os direitos reservados.
        </p>
    </footer>
</body>
</html>
