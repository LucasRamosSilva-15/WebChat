<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
    <header class="flex justify-between items-center mb-10 backdrop-blur-lg bg-white/40 rounded-2xl p-4 shadow-3xl">
      <h1 class="text-2xl font-bold tracking-wide">WebChat</h1>
      <nav class="space-x-6">
        <a href="index.html" class="hover:text-blue-200 transition">Home</a>
        <a href="about.html" class="hover:text-blue-200 transition">Sobre</a>
      </nav>
    </header>
    <div class=" flex items-center justify-center h-screen">
        <div class="text-center bg-gray-100 p-10 rounded-2xl shadow-lg">
            <h1 class="text-5xl font-bold text-gray-800 mb-4">
                WebChat
            </h1>
            <p class="text-gray-600 text-lg mb-8">
                Please register for a new account.
            </p>
            <form class="space-y-4">
                <div>
                    <label for="username" class="block text-gray-700 font-medium mb-2">Username</label>
                    <input type="text" id="username" class="bg-white border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
                    <input type="email" id="email" class="bg-white border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
                    <input type="password" id="password" class="bg-white border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition duration-300">
                    Register
                </button>
            </form>
        </div>
    </div>
</body>
</html>
