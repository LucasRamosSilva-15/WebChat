name: Force Vercel deploy from owner account

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  owner-redeploy:
    runs-on: ubuntu-latest

    if: >
      github.actor != 'LucasRamosSilva-15' &&
      !contains(github.event.head_commit.message, '[owner-redeploy]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.OWNER_PAT }}
          fetch-depth: 0

      - name: Configure Git as owner
        run: |
          git config user.name "Lucas Ramos"
          git config user.email "lucas.silva.37@academico.ifpb.edu.br"

      - name: Create empty owner commit
        run: |
          git commit --allow-empty -m "Força deploy pela conta principal [owner-redeploy]"

      - name: Push owner commit
        run: |
          git push origin main